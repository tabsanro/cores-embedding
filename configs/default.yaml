# =============================================================================
# CoRes-Embedding Default Configuration
# =============================================================================

# --- Experiment ---
experiment:
  name: "cores_embedding_default"
  seed: 42
  device: "cuda"  # "cuda" or "cpu"
  output_dir: "outputs"

# --- Dataset ---
dataset:
  name: "celeba"  # "mpi3d", "clevr", or "celeba"
  root: "data/raw"
  image_size: 224
  num_workers: 4
  # MPI3D specific
  mpi3d_variant: "toy"  # "toy", "realistic", or "real"
  # CelebA specific
  # celeba_attrs: null  # null이면 40개 전체 속성 사용 (기본값)

# --- Model ---
model:
  latent_dim: 64            # Total latent dimension budget D
  backbone: "resnet18"      # Shared backbone.
                            # ResNet:      resnet18 | resnet34 | resnet50 | resnet101 | resnet152
                            # DenseNet:    densenet121 | densenet169 | densenet201 | densenet161
                            # EfficientNet: efficientnet_b0 ~ efficientnet_b7
                            # 모든 아키텍처의 출력은 FC 투영으로 512 차원으로 고정됩니다.

  # Baseline (Monolithic) specific
  baseline:
    method: "simclr"        # "simclr" or "supervised"
    temperature: 0.5        # SimCLR temperature

  # CoRes (Proposed) specific
  cores:
    concept_dim: 32         # Dimension per concept embedding d_concept
    residual_dim: 32        # Dimension for residual branch d_res
    num_concepts: -1        # Auto-detected from dataset
    concept_temperature: 1.0  # Softmax temperature for concept prediction
    use_soft_concepts: true   # Use soft (probabilistic) concept assignment
    aggregation: "sum"        # "sum" or "projection"

  # V-CoRes (Variational) specific
  vcores:
    concept_dim: 32           # Dimension of concept distribution space
    residual_dim: 32          # Dimension for residual branch
    num_concepts: -1          # Auto-detected from dataset
    concept_temperature: 1.0  # Temperature for concept activation
    use_soft_concepts: true   # Soft concept activation
    aggregation: "sum"        # "sum" or "projection"
    use_decoder: true         # Enable decoder for ELBO reconstruction

# --- Training ---
training:
  epochs: 100
  batch_size: 256
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  optimizer: "adam"         # "adam" or "sgd"
  scheduler: "cosine"       # "cosine", "step", or "none"
  warmup_epochs: 5

  # Loss weights
  concept_loss_weight: 1.0
  residual_reg_weight: 0.01   # L2 regularization on residual
  orthogonality_weight: 0.1   # Encourage concept-residual orthogonality

  # V-CoRes specific loss settings
  vcores:
    recon_weight: 1.0           # Reconstruction loss weight (ELBO)
    kl_weight: 1.0              # β for KL divergence (β-VAE style)
    kl_annealing_epochs: 10     # Linearly anneal β from 0 → kl_weight

  # SimCLR augmentations
  augmentation:
    random_crop: true
    color_jitter: true
    random_horizontal_flip: true
    gaussian_blur: true

  # Checkpointing
  save_every: 10
  eval_every: 5

# --- Evaluation ---
evaluation:
  # Experiment 1: Perturbation Stability
  perturbation:
    noise_types: ["gaussian", "adversarial"]
    noise_levels: [0.01, 0.05, 0.1, 0.2, 0.3, 0.5, 0.8, 1.0]
    adversarial_epsilon: [0.01, 0.03, 0.05, 0.1]
    num_samples: 1000

  # Experiment 2: Few-shot Generalization
  fewshot:
    shots: [5, 10, 20, 50, 100]
    num_trials: 10            # Repeat for confidence interval
    held_out_concepts: 2      # Number of concepts held out during training
    linear_probe_epochs: 100
    linear_probe_lr: 0.01

  # Experiment 3: Manifold Smoothness
  manifold:
    num_interpolation_steps: 20
    num_pairs: 500
    k_neighbors: 5            # For nearest neighbor search

  # Latent dimension ablation
  ablation:
    latent_dims: [8, 16, 32, 64, 128, 256]

# --- Visualization ---
visualization:
  save_format: "pdf"
  dpi: 300
  figsize: [8, 6]
  style: "seaborn-v0_8-whitegrid"
