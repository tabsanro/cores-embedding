# =============================================================================
# Seq-CoRes Configuration
# Sequential Compositional Residual Embedding
# =============================================================================

# --- Experiment ---
experiment:
  name: "cores_embedding_default"
  seed: 42
  device: "cuda"
  output_dir: "outputs"

# --- Dataset ---
dataset:
  name: "cub200"          # "celeba", "cub200", "mpi3d", "clevr"
  root: "data/raw"
  image_size: 224
  num_workers: 10
  mpi3d_variant: "toy"
  cub200_num_concepts: 20
  celeba_attrs:
    - "Male"
    - "Eyeglasses"
    - "Smiling"
    - "Young"
    - "Blond_Hair"
    - "Black_Hair"
    - "Brown_Hair"
    - "Bangs"
    - "Heavy_Makeup"
    - "Wearing_Hat"

# --- Model ---
model:
  latent_dim: 64

  seqcores:
    num_codes: 128          # 코드북 크기 K (자생적 개념 수)
    code_dim: 32            # 각 코드 벡터 차원
    hidden_dim: 256         # GRU 은닉 상태 차원
    residual_dim: 32        # 잔차 벡터 차원
    max_steps: 8            # 최대 시퀀스 길이 T
    commitment_cost: 0.25   # VQ commitment loss 가중치
    ema_decay: 0.99         # EMA 코드북 업데이트 decay (0=gradient, >0=EMA)
    use_decoder: true       # Phase 1 디코더 활성화
    num_gru_layers: 1       # GRU 레이어 수
    num_supervised_slots: -1  # 지도학습 슬롯 수 (-1=auto: min(num_concepts, max_steps))

# --- Training ---
training:
  batch_size: 128
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  optimizer: "adam"
  scheduler: "cosine"
  save_every: 10
  eval_every: 5

  # Seq-CoRes v2 전용 설정
  seqcores:
    # Phase 1: VQ Codebook Warmup
    phase1_epochs: 50
    phase1_lr: 3e-4

    # Phase 2: Task + Concept Supervision
    phase2_epochs: 80
    phase2_lr: 3.0e-4

    # Loss 가중치
    task_weight: 1.0
    vq_weight: 1.0
    recon_weight: 1.0                   # Phase 1 재구성 가중치
    phase2_recon_weight: 0.1            # Phase 2 재구성 가중치 (Regularization)
    concept_supervision_weight: 1.0     # 슬롯 개념 지도학습 가중치
    residual_penalty_weight: 0.2        # 잔차 패널티 가중치 (잔차 억제)

# --- Evaluation ---
evaluation:
  perturbation:
    noise_types: ["gaussian", "adversarial"]
    noise_levels: [0.01, 0.05, 0.1, 0.2, 0.3, 0.5, 0.8, 1.0]
    adversarial_epsilon: [0.01, 0.03, 0.05, 0.1]
    num_samples: 1000

  fewshot:
    shots: [5, 10, 20, 50, 100]
    num_trials: 10
    held_out_concepts: 2
    linear_probe_epochs: 100
    linear_probe_lr: 0.01

  manifold:
    num_interpolation_steps: 20
    num_pairs: 500
    k_neighbors: 5

# --- Visualization ---
visualization:
  save_format: "pdf"
  dpi: 300
  figsize: [8, 6]
  style: "seaborn-v0_8-whitegrid"
